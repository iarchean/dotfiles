onboarding = false

[theme]
name = "catppuccin"

[ui]
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "system"

[keys]
prefix = "`"
new_workspace = "n"
rename_workspace = "shift+n"
close_workspace = "X"
reload_config = ""                # optional, unset by default
open_notification_target = ""     # optional, unset by default
new_tab = "c"
split_vertical = "d"
split_horizontal = "D"
close_pane = "x"
rename_pane = ""                  # optional, unset by default
fullscreen = "f"
resize_mode = "r"
toggle_sidebar = "b"
previous_workspace = "ctrl+alt+["
next_workspace = "ctrl+alt+]"
previous_agent = "ctrl+["
next_agent = "ctrl+]"
previous_tab = "alt+["
next_tab = "alt+]"
focus_pane_left = "alt+h"
focus_pane_down = "alt+j"
focus_pane_up = "alt+k"
focus_pane_right = "alt+l"
