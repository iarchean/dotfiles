format = """
$hostname\
$gcloud\
$kubernetes\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

# add_newline = false
# [line_break] disabled = true

[directory]
style = "blue"
read_only = " ÔÄ£"
read_only_style = "bright-black"

[character]
format = '$symbol '
success_symbol = '[ůįöļ](bold green)'
error_symbol = '[ůįöļ](bold red)'
vimcmd_symbol = '[ůįßė](bold green)'
vimcmd_visual_symbol = '[ůįßė](bold yellow)'
vimcmd_replace_symbol = '[ůįßė](bold purple)'
vimcmd_replace_one_symbol = '[ůįßė](bold purple)'
disabled = false

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = " [[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style)"
style = "bright-black"

[kubernetes]
symbol = 'Ó†Ě '
format = '[$symbol$context]($style) '
# style = 'cyan bold'
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = ["!TMUX"]
disabled = false

[[kubernetes.contexts]]
# gke
context_pattern = "gke_.*_(?P<cluster>[\\w-]+)"
context_alias = "$cluster"

[[kubernetes.contexts]]
# eks
context_pattern = "arn:aws:eks:.*:.*:cluster/(?P<cluster>[\\w-]+)"
context_alias = "$cluster"


[hostname]
ssh_only = true
format = '$hostname '
style = 'bold bright-purple'

[gcloud]
format = '[$symbol($region )($project)]($style) '
symbol = 'Óě≤ '
detect_env_vars = ["!TMUX"]

[gcloud.region_aliases]
us-central1 = 'uc1'
asia-northeast1 = 'Tokyo'
